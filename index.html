<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sonora Biodiversity</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Sonora is extremely rich in biodiversity.</h1>
  <p>Despite being very hot and dry, there is a lot of life!</p>
  <p><b>Counting around:</b></p>

  <div class="grid">
    <!-- Left column (descending) -->
    <div class="cell c1">
      <div><span class="number green">3,500</span> species of plants</div>
      <img src="icons/tree.png" class="icon" alt="Plants icon" />
    </div>

    <div class="cell c2">
      <div><span class="number yellow">1,000</span> species of bees</div>
      <img src="icons/bee.png" class="icon" alt="Bees icon" />
    </div>

    <div class="cell c3">
      <div><span class="number blue">500</span> species of birds</div>
      <img src="icons/bird.png" class="icon" alt="Birds icon" />
    </div>

    <div class="cell c4">
      <div><span class="number green">100</span> species of reptiles</div>
      <img src="icons/reptile.png" class="icon" alt="Reptiles icon" />
    </div>

    <!-- Right column (descending) -->
    <div class="cell c5">
      <div><span class="number red">60</span> species of mammals</div>
      <img src="icons/dog.png" class="icon" alt="Mammals icon" />
    </div>

    <div class="cell c6">
      <div><span class="number cyan">30</span> species native fish</div>
      <img src="icons/fish.png" class="icon" alt="Fish icon" />
    </div>

    <div class="cell c7">
      <div><span class="number green">20</span> species of amphibians</div>
      <img src="icons/frog.png" class="icon" alt="Amphibians icon" />
    </div>

    <!-- Optional empty cell to match original look (only visible on 2-col) -->
    <div class="cell empty" aria-hidden="true"></div>
  </div>
</body>
</html>
